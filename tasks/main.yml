---
- name: Install PostgreSQL server packages
  ansible.builtin.dnf:
    name:
      - postgresql-server
      - postgresql-plperl
    state: present

- name: Install PostgreSQL contrib package
  ansible.builtin.dnf:
    name: postgresql-contrib
    state: present
  when: postgresql_ext_install_contrib

- name: Install PostgreSQL devel package
  ansible.builtin.dnf:
    name: postgresql-server-devel
    state: present
  when: postgresql_ext_install_dev_headers

- name: Install extra packages
  ansible.builtin.dnf:
    name: "{{ postgresql_extra_packages }}"
    state: present
  when: postgresql_extra_packages | length > 0

- name: Initialise PostgreSQL cluster
  ansible.builtin.command: initdb -D /var/lib/pgsql/data
  args:
    creates: /var/lib/pgsql/data/PG_VERSION
  become: true
  become_user: postgres

- name: Enable and start PostgreSQL
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true

- name: Configure pg_hba.conf password hosts
  community.postgresql.postgresql_pg_hba:
    dest: /var/lib/pgsql/data/pg_hba.conf
    contype: host
    databases: all
    users: all
    source: "{{ item }}"
    method: md5
  loop: "{{ postgresql_pg_hba_passwd_hosts }}"
  become: true
  become_user: postgres
  notify: Reload PostgreSQL

- name: Configure listen_addresses
  community.postgresql.postgresql_set:
    name: listen_addresses
    value: "{{ postgresql_listen_addresses | join(',') }}"
  become: true
  become_user: postgres
  notify: Restart PostgreSQL

- name: Configure random_page_cost
  community.postgresql.postgresql_set:
    name: random_page_cost
    value: "{{ postgresql_random_page_cost }}"
  become: true
  become_user: postgres
  notify: Reload PostgreSQL

- name: Create PostgreSQL users
  community.postgresql.postgresql_user:
    name: "{{ item.name }}"
    password: "{{ item.password | default(omit) }}"
    role_attr_flags: "{{ item.role_attr_flags | default(omit) }}"
    state: present
  loop: "{{ postgresql_users }}"
  become: true
  become_user: postgres
  no_log: true

- name: Create PostgreSQL databases
  community.postgresql.postgresql_db:
    name: "{{ item.name }}"
    owner: "{{ item.owner | default(omit) }}"
    encoding: "{{ item.encoding | default(omit) }}"
    lc_collate: "{{ item.lc_collate | default(omit) }}"
    lc_ctype: "{{ item.lc_ctype | default(omit) }}"
    template: template0
    state: present
  loop: "{{ postgresql_databases }}"
  become: true
  become_user: postgres

- name: Install PostgreSQL extensions
  community.postgresql.postgresql_ext:
    name: "{{ item.1 }}"
    db: "{{ item.0.db }}"
    state: present
  loop: "{{ postgresql_database_extensions | subelements('extensions') }}"
  become: true
  become_user: postgres

- name: Install Perl system libraries
  ansible.builtin.dnf:
    name: "{{ evergreen_database_perl_dependencies }}"
    state: present

- name: Install cpanminus
  ansible.builtin.dnf:
    name: perl-App-cpanminus
    state: present

- name: Install CPAN modules
  community.general.cpanm:
    name: "{{ item.name }}"
    notest: "{{ item.notest | default(false) }}"
  loop: "{{ evergreen_database_cpan_modules }}"
