---
postgresql_version: 18

postgresql_listen_addresses:
  - '*'
postgresql_pg_hba_passwd_hosts:
  - 0.0.0.0/0
postgresql_ext_install_contrib: true
postgresql_ext_install_dev_headers: true

postgresql_random_page_cost: 2.0

postgresql_extensions:
  - gcc
  - python3-psycopg2
  - perl-Business-ISBN
  - perl-JSON-XS
  - perl-MARC-Record
  - perl-MARC-XML
  - perl-MARC-Charset
  - perl-UUID-Tiny
  - perl-XML-LibXML
  - perl-XML-LibXSLT

postgresql_users:
  - name: evergreen
    pass: evergreen
    encrypted: true

postgresql_user_privileges:
  - name: evergreen
    role_attr_flags: "SUPERUSER"

postgresql_databases:
  - name: evergreen
    owner: evergreen
    hstore: true
    encoding: 'UNICODE'
    lc_collate: 'C'
    lc_ctype: 'C'

postgresql_database_extensions:
  - db: evergreen
    extensions:
      - xml2
      - intarray
      - pgcrypto
      - unaccent

evergreen_database_perl_dependencies:
  - perl-Business-ISBN
  - perl-JSON-XS
  - perl-MARC-Record
  - perl-MARC-XML
  - perl-MARC-Charset
  - perl-UUID-Tiny
  - perl-XML-LibXML
  - perl-XML-LibXSLT
  - perl-DBI
  - perl-DBD-Pg
  - make
