---
- name: Verify
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Check PostgreSQL service is running
      ansible.builtin.service_facts:

    - name: Assert PostgreSQL is active
      ansible.builtin.assert:
        that: ansible_facts.services['postgresql.service'].state == 'running'
        fail_msg: "PostgreSQL service is not running"

    - name: Check evergreen database exists
      ansible.builtin.command: psql -U postgres -tAc "SELECT 1 FROM pg_database WHERE datname='evergreen'"
      register: db_check
      changed_when: false
      become: true
      become_user: postgres

    - name: Assert evergreen database exists
      ansible.builtin.assert:
        that: db_check.stdout == '1'
        fail_msg: "evergreen database does not exist"

    - name: Check PLPerl package is installed
      ansible.builtin.package_facts:
        manager: rpm

    - name: Assert postgresql-plperl is installed
      ansible.builtin.assert:
        that: "'postgresql-plperl' in ansible_facts.packages"
        fail_msg: "postgresql-plperl package is not installed"

    - name: Check CPAN modules are loadable
      ansible.builtin.command: "perl -M{{ item }} -e 1"
      loop:
        - MARC::File::XML
        - String::KeyboardDistance
        - Text::Levenshtein::Damerau::XS
      changed_when: false
      register: cpan_check

    - name: Assert all CPAN modules loaded without error
      ansible.builtin.assert:
        that: item.rc == 0
        fail_msg: "CPAN module failed to load: {{ item.item }}"
      loop: "{{ cpan_check.results }}"
